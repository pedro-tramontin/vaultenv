name: Release

on:
  push:
    tags:
      - 'v[0-9]+.*'

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build Release (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
      actions: write
    strategy:
      fail-fast: false
      matrix:
        include:
          # Linux
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            cross: false
          - target: i686-unknown-linux-gnu
            os: ubuntu-latest
            cross: true
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            cross: true

          # macOS
          - target: x86_64-apple-darwin
            os: macos-latest
            cross: false
          - target: aarch64-apple-darwin
            os: macos-latest
            cross: false

          # Windows
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            cross: false
          - target: i686-pc-windows-msvc
            os: windows-latest
            cross: false

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross
        if: matrix.cross
        run: cargo install cross --locked

      - name: Install cross-compilation tools (Linux i686)
        if: matrix.target == 'i686-unknown-linux-gnu' && !matrix.cross
        run: |
          sudo dpkg --add-architecture i386
          sudo apt-get update
          sudo apt-get install -y gcc-multilib libc6-dev-i386

      - name: Install cross-compilation tools (Linux aarch64)
        if: matrix.target == 'aarch64-unknown-linux-gnu' && !matrix.cross
        run: sudo apt-get update && sudo apt-get install -y gcc-aarch64-linux-gnu

      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Build binary (native)
        if: ${{ !matrix.cross }}
        run: cargo build --release --locked --target ${{ matrix.target }}
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc

      - name: Build binary (cross)
        if: matrix.cross
        run: cross build --release --locked --target ${{ matrix.target }}

      - name: Set environment variables
        shell: bash
        run: |
          if [[ "${{ matrix.os }}" == "windows-latest" ]]; then
            echo "BIN=target/${{ matrix.target }}/release/vaultenv.exe" >> "$GITHUB_ENV"
            echo "ARCHIVE=vaultenv-${GITHUB_REF_NAME}-${{ matrix.target }}.zip" >> "$GITHUB_ENV"
          else
            echo "BIN=target/${{ matrix.target }}/release/vaultenv" >> "$GITHUB_ENV"
            echo "ARCHIVE=vaultenv-${GITHUB_REF_NAME}-${{ matrix.target }}.tar.gz" >> "$GITHUB_ENV"
          fi

      - name: Package binary (Unix)
        if: ${{ matrix.os != 'windows-latest' }}
        run: |
          tar czf "$ARCHIVE" -C "$(dirname "$BIN")" "$(basename "$BIN")"
          sha256sum "$ARCHIVE" > "$ARCHIVE.sha256"

      - name: Package binary (Windows)
        if: ${{ matrix.os == 'windows-latest' }}
        # The Windows runner's default shell is PowerShell Core 7, which does
        # not expand `"$ARCHIVE"` / `"$BIN"` as bash does (PowerShell uses
        # `$env:ARCHIVE` to read env vars). Without this override, 7z receives
        # an empty archive-name argument and aborts with "Archive name cannot
        # be empty", and the artifact upload step then fails with `if-no-files-found: error`.
        # Forcing bash here matches the "Set environment variables" step above
        # (which also uses bash) and the Unix packaging step's inherited default.
        shell: bash
        run: |
          7z a "$ARCHIVE" "$BIN"
          certutil -hashfile "$ARCHIVE" SHA256 | grep -v "CertUtil" > "$ARCHIVE.sha256"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: vaultenv-${{ matrix.target }}
          path: |
            vaultenv-*
          if-no-files-found: error

  publish:
    name: Publish GitHub Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
      actions: read
    steps:
      - uses: actions/checkout@v4
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          pattern: vaultenv-*
          merge-multiple: true
      - name: Read CHANGELOG for release body
        id: changelog
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          awk "/^## \[$VERSION\]/{flag=1;next}/^## \[/{flag=0}flag" CHANGELOG.md > /tmp/release_body.md || true
          if [ ! -s /tmp/release_body.md ]; then
            echo "No CHANGELOG section found for $VERSION — using generated notes." > /tmp/release_body.md
          fi
      - name: Publish Release
        uses: softprops/action-gh-release@v2
        with:
          body_path: /tmp/release_body.md
          files: artifacts/*
          generate_release_notes: true
          draft: false
          prerelease: false
