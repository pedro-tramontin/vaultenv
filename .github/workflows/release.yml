name: Release

# This workflow compiles the release binaries and uploads them to the
# GitHub Release. It does NOT create the release or write the release
# body — that is release-please's responsibility (.github/workflows/
# release-please.yml), which creates the GitHub Release as part of
# pushing the v* tag.
#
# Why split it this way? release-please is the only thing that knows
# the correct release body for a given tag (it groups commits by semver
# impact, applies the bump-minor-pre-major / bump-patch-for-minor-pre-major
# rules from release-please-config.json, etc.). Re-deriving the body
# here would duplicate that logic and drift over time. Keeping the body
# under release-please's control also means re-running this workflow
# (e.g. after a flaky cross-compile job is retried) does NOT clobber the
# body — binaries are uploaded additively; the body stays intact.

on:
  push:
    tags:
      - 'v[0-9]+.*'

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build Release (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
      actions: write
    strategy:
      fail-fast: false
      matrix:
        include:
          # Linux
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            cross: false
          - target: i686-unknown-linux-gnu
            os: ubuntu-latest
            cross: true
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            cross: true

          # macOS
          - target: x86_64-apple-darwin
            os: macos-latest
            cross: false
          - target: aarch64-apple-darwin
            os: macos-latest
            cross: false

          # Windows
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            cross: false
          - target: i686-pc-windows-msvc
            os: windows-latest
            cross: false

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross
        if: matrix.cross
        run: cargo install cross --locked

      - name: Install cross-compilation tools (Linux i686)
        if: matrix.target == 'i686-unknown-linux-gnu' && !matrix.cross
        run: |
          sudo dpkg --add-architecture i386
          sudo apt-get update
          sudo apt-get install -y gcc-multilib libc6-dev-i386

      - name: Install cross-compilation tools (Linux aarch64)
        if: matrix.target == 'aarch64-unknown-linux-gnu' && !matrix.cross
        run: sudo apt-get update && sudo apt-get install -y gcc-aarch64-linux-gnu

      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Build binary (native)
        if: ${{ !matrix.cross }}
        run: cargo build --release --locked --target ${{ matrix.target }}
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc

      - name: Build binary (cross)
        if: matrix.cross
        run: cross build --release --locked --target ${{ matrix.target }}

      - name: Set environment variables
        shell: bash
        run: |
          if [[ "${{ matrix.os }}" == "windows-latest" ]]; then
            echo "BIN=target/${{ matrix.target }}/release/vaultenv.exe" >> "$GITHUB_ENV"
            echo "ARCHIVE=vaultenv-${GITHUB_REF_NAME}-${{ matrix.target }}.zip" >> "$GITHUB_ENV"
          else
            echo "BIN=target/${{ matrix.target }}/release/vaultenv" >> "$GITHUB_ENV"
            echo "ARCHIVE=vaultenv-${GITHUB_REF_NAME}-${{ matrix.target }}.tar.gz" >> "$GITHUB_ENV"
          fi

      - name: Package binary (Unix)
        if: ${{ matrix.os != 'windows-latest' }}
        run: |
          tar czf "$ARCHIVE" -C "$(dirname "$BIN")" "$(basename "$BIN")"
          sha256sum "$ARCHIVE" > "$ARCHIVE.sha256"

      - name: Package binary (Windows)
        if: ${{ matrix.os == 'windows-latest' }}
        run: |
          7z a "$ARCHIVE" "$BIN"
          certutil -hashfile "$ARCHIVE" SHA256 | grep -v "CertUtil" > "$ARCHIVE.sha256"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: vaultenv-${{ matrix.target }}
          path: |
            vaultenv-*
          if-no-files-found: error

  publish:
    # Upload the built binaries to the GitHub Release that release-please
    # already created. We do NOT touch the release body — release-please
    # is the sole owner of it.
    #
    # NO checkout here: this job does not compile anything. The 7 matrix
    # `build` jobs each have their own `actions/checkout@v4` for the
    # `cargo build` step; by the time this job runs, all 7 binaries
    # exist as GitHub Actions artifacts and the only thing left is to
    # download them and upload to the release.
    name: Upload Release Assets
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
      actions: read
    steps:
      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          pattern: vaultenv-*
          merge-multiple: true
      - name: Upload assets to the existing GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*
          # Intentionally NOT setting body_path / body / generate_release_notes:
          # release-please already wrote the release body when it pushed the
          # v* tag, and we want to preserve it. softprops/action-gh-release@v2
          # leaves the existing body untouched when no body-related input is
          # provided. See the workflow file's top-of-file comment for the
          # full rationale.
          draft: false
          prerelease: false
