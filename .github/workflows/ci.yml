name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -Dwarnings

jobs:
  check:
    name: Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo check --locked

  fmt:
    name: Rustfmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt -- --check

  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo clippy --all-targets --all-features -- -D warnings

  cognitive-complexity:
    name: Cognitive Complexity
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo clippy --all-targets --all-features -- -D clippy::cognitive_complexity

  deny:
    name: Cargo Deny
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: EmbarkStudios/cargo-deny-action@v2

  test:
    name: Test
    runs-on: ubuntu-latest
    env:
      VAULT_INTEGRATION_TEST: 1
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo test --locked

  coverage:
    name: Test Coverage
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-tarpaulin
      - run: cargo tarpaulin --all-targets --out Xml --timeout 120
      - uses: codecov/codecov-action@v5
        with:
          files: cobertura.xml
          fail_ci_if_error: false
          name: vaultenv-coverage
          verbose: true

  unsafe-analysis:
    name: Unsafe Code Density
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-geiger
      - run: |
          cargo geiger --all-targets --all-features --output-format stdout \
            | tee geiger-output.txt
          if grep -E "^\s*[0-9]+\s+[0-9]+\s+[0-9]+\s+vaultenv" geiger-output.txt | grep -qv "0 0 0"; then
            echo "::warning::Unsafe Rust detected in vaultenv code. Review required."
          fi

  build-release:
    name: Build Release Binary
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo build --release --locked

  # One-shot Windows verification. Added to validate the cross-platform fix
  # in PR #36 (cfg-gates + rustls) and the Windows packaging fix in PR #38
  # (bash vs PowerShell). Once both fixes are confirmed working in a release,
  # this job can be removed — the `ubuntu-latest` build-release job above is
  # the canonical signal for the default platform, and `release.yml`
  # exercises the full 7-target matrix on tag push. Keep this for at least
  # one full release cycle to catch any cfg-gate or shell-handling regressions
  # at PR time instead of release time.
  build-windows:
    name: Build Windows (x86_64)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc
      - uses: Swatinem/rust-cache@v2
      - name: Build
        # RUSTFLAGS=-Dwarnings from the env turns the cfg-gate code's
        # Windows-only unused-variable warning into an error, so a missing
        # `#[cfg_attr(windows, allow(unused_variables))]` on `exec_child`'s
        # `cmd_name` parameter would fail this step.
        run: cargo build --release --locked --target x86_64-pc-windows-msvc
      - name: Verify packaging step works end-to-end
        # The `shell: bash` directive is REQUIRED — without it, this step
        # would inherit the runner default (PowerShell Core 7), and PowerShell
        # does not expand "$ARCHIVE" / "$BIN" as bash does. That is exactly
        # the bug that PR #38 fixed in `release.yml`; this step is the
        # in-PR regression test for it.
        shell: bash
        run: |
          BIN="target/x86_64-pc-windows-msvc/release/vaultenv.exe"
          ARCHIVE="vaultenv-test-x86_64-pc-windows-msvc.zip"
          7z a "$ARCHIVE" "$BIN"
          certutil -hashfile "$ARCHIVE" SHA256 | grep -v "CertUtil" > "$ARCHIVE.sha256"
          ls -la "$ARCHIVE" "$ARCHIVE.sha256"
