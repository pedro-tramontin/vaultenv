[graph]
all-features = false
no-default-features = false

[output]
feature-depth = 1

[advisories]
db-path = "~/.cargo/advisory-db"
db-urls = ["https://github.com/rustsec/advisory-db"]
yanked = "warn"
# rsa 0.9.10 is pulled in only by jsonwebtoken dev-dependency for test JWT signing.
# No patched version exists yet (RUSTSEC-2023-0071). Ignored because it is not
# used in production code paths.
ignore = ["RUSTSEC-2023-0071"]

[licenses]
allow = [
    "MIT",
    "Apache-2.0",
    "BSD-3-Clause",
    "ISC",
    "Unicode-3.0",
    "Unicode-DFS-2016",
    "OpenSSL",
    "MPL-2.0",
    # `webpki-roots` (used by `rustls` for the bundled Mozilla CA roots) is
    # dual-licensed under CDLA-Permissive-2.0 or MIT. The CDLA-Permissive-2.0
    # path is what `cargo` selects by default. CDLA-Permissive is a Linux
    # Foundation data-license, not a software-license; it grants use of the
    # contained data (the Mozilla CA bundle) without copyleft or attribution
    # obligations beyond those already required by the Mozilla source terms.
    "CDLA-Permissive-2.0",
]
confidence-threshold = 0.8

[bans]
multiple-versions = "warn"
wildcards = "allow"

[sources]
unknown-registry = "warn"
unknown-git = "warn"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
